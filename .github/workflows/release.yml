name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22.12"

      - name: Run tests
        run: go test ./...

      - name: Build release packages
        run: |
          chmod +x scripts/build-release.sh
          VERSION="${GITHUB_REF_NAME#v}" scripts/build-release.sh

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-ipk
          path: dist/*.ipk
